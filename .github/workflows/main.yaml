name: image-build

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

concurrency:
  group: docker-ghar-image
  cancel-in-progress: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      arc: ${{ steps.changes.outputs.arc }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Check Changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            arc:
              - ".github/workflows/main.yaml"
              - "Dockerfile"

  gha-runner-scale-set-image:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.arc == 'true' }}
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    with:
      dockerfile: "Dockerfile"
      tags-prefix: ${{ github.ref_name }}
      image-name: "improwised/gha-runner-scale-set"
